<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CI/CD Live Demo</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 60px;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
            animation: fadeIn 0.7s ease;
            transform: translateY(0);
            position: relative;
        }

        .container::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(34,197,94,0.3), transparent 70%);
            filter: blur(60px);
            z-index: -1;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            opacity: 0.6;
            margin-bottom: 35px;
            font-size: 1rem;
        }

        .status {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, #22c55e, #4ade80);
            color: #022c22;
            font-weight: bold;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(34,197,94,0.5);
            animation: pulse 2s infinite;
        }

        .version {
            font-size: 1.3rem;
            margin-top: 10px;
            opacity: 0.85;
        }

        .buttons {
            margin-top: 35px;
        }

        button {
            padding: 12px 22px;
            margin: 6px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .reload {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: black;
        }

        .reload:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34,197,94,0.4);
        }

        .info {
            background: rgba(71, 85, 105, 0.6);
            color: white;
        }

        .info:hover {
            transform: translateY(-2px);
            background: rgba(100, 116, 139, 0.7);
        }

        .footer {
            margin-top: 25px;
            font-size: 0.75rem;
            opacity: 0.4;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            60% {
                opacity: 1;
                transform: translateY(-5px) scale(1.02);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(34,197,94,0.4); }
            50% { box-shadow: 0 0 25px rgba(34,197,94,0.8); }
            100% { box-shadow: 0 0 10px rgba(34,197,94,0.4); }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 Hello Fariza!</h1>
        <p class="subtitle">GitHub Actions → AWS EC2 Auto Deploy</p>

        <div class="status">Deployment Successful</div>

        <p class="version">Version: v13</p>

        <div class="buttons">
            <button class="reload" onclick="location.reload()">Reload</button>
            <button class="info" onclick="alert('CI/CD is working!')">Info</button>
        </div>

        <div class="footer">
            Live auto-deployment demo
        </div>
    </div>
</body>
</html>
