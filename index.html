<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CI/CD Live Demo</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            padding: 50px;
            border-radius: 20px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: fadeIn 0.6s ease;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            opacity: 0.7;
            margin-bottom: 30px;
        }

        .status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 999px;
            background: #22c55e;
            color: black;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .version {
            font-size: 1.2rem;
            margin-top: 10px;
            opacity: 0.8;
        }

        .buttons {
            margin-top: 30px;
        }

        button {
            padding: 12px 20px;
            margin: 5px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .reload {
            background: #22c55e;
            color: black;
        }

        .reload:hover {
            background: #16a34a;
        }

        .info {
            background: #334155;
            color: white;
        }

        .info:hover {
            background: #475569;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 CI/CD Pipeline</h1>
        <p class="subtitle">Auto deployment from GitHub → AWS EC2</p>

        <div class="status">Deployment Successful</div>

        <p class="version">Version: v6</p>

        <div class="buttons">
            <button class="reload" onclick="location.reload()">Reload</button>
            <button class="info" onclick="alert('CI/CD is working!')">Info</button>
        </div>
    </div>
</body>
</html>
